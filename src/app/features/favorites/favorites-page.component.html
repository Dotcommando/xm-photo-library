<section class="page">
  <h1>Favorites</h1>

  @if (favoritesStore.favorites().length > 0) {
    <div class="favorites-grid">
      @for (photo of favoritesStore.favorites(); track photo.id) {
        <app-photo-card [photo]="photo" [favorite]="true" />
      }
    </div>
  } @else {
    <p class="empty-state">No favorite photos yet.</p>
  }
</section>
