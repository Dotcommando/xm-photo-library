<button class="photo-card" type="button" (click)="selectPhoto()">
  <img class="photo-card__image" [src]="photo().thumbnailUrl" [alt]="'Photo ' + photo().seed" />

  <span
    class="photo-card__favorite"
    [class.photo-card__favorite--active]="favorite()"
    aria-hidden="true"
  >
    <mat-icon class="photo-card__favorite-icon" aria-hidden="true">
      {{ favorite() ? 'favorite' : 'favorite_border' }}
    </mat-icon>
  </span>
</button>
