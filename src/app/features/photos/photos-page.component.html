<section class="page">
  <h1>Photos</h1>

  <div class="photos-grid">
    @for (photo of photosStore.photos(); track photo.id) {
      <app-photo-card [photo]="photo" />
    }
  </div>

  @if (photosStore.loading()) {
    <div class="photos-loader" aria-label="Loading photos">
      <mat-progress-spinner mode="indeterminate" diameter="56" />
    </div>
  }

  <div
    class="scroll-anchor"
    appInfiniteScroll
    [appInfiniteScrollDisabled]="photosStore.loading()"
    appInfiniteScrollRootMargin="320px"
    (appInfiniteScrollReached)="loadMorePhotos()"
  ></div>
</section>
